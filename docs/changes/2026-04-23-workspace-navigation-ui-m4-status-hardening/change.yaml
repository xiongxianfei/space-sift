summary:
  - Keep cleanup-derived shell status tied to the originating scan so reopening a different stored scan clears stale rescan prompts.
  - Keep interrupted-run attention and active live-task notices visible from any workspace without stealing focus.
  - Add shell-level observability for next-safe-action selection and notice rendering while preserving the non-destructive navigation contract.

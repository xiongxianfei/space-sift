name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Verify release readiness
        run: bash scripts/release-verify.sh

  windows-release:
    needs: release-readiness
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate signing secrets
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          $required = @(
            "WINDOWS_CERTIFICATE",
            "WINDOWS_CERTIFICATE_PASSWORD",
            "TAURI_SIGNING_PRIVATE_KEY",
            "TAURI_SIGNING_PRIVATE_KEY_PASSWORD",
            "TAURI_UPDATER_PUBLIC_KEY"
          )

          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "Missing required release secret: $name"
            }
          }

      - name: Decode Windows signing certificate
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        run: |
          $signingDir = Join-Path $PWD "signing"
          New-Item -ItemType Directory -Force -Path $signingDir | Out-Null
          $certificatePath = Join-Path $signingDir "space-sift-release.pfx"
          [System.IO.File]::WriteAllBytes(
            $certificatePath,
            [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          )
          "SPACE_SIFT_WINDOWS_CERTIFICATE_PATH=$certificatePath" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Append `
            -Encoding utf8
          "SPACE_SIFT_WINDOWS_TIMESTAMP_URL=http://timestamp.digicert.com" | Out-File `
            -FilePath $env:GITHUB_ENV `
            -Append `
            -Encoding utf8

      - name: Generate release-only Tauri config
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
        run: npm run release:config

      - name: Build and publish signed Windows release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPACE_SIFT_ENABLE_CODE_SIGNING: "true"
          SPACE_SIFT_WINDOWS_CERTIFICATE_PATH: ${{ env.SPACE_SIFT_WINDOWS_CERTIFICATE_PATH }}
          SPACE_SIFT_WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          SPACE_SIFT_WINDOWS_TIMESTAMP_URL: ${{ env.SPACE_SIFT_WINDOWS_TIMESTAMP_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Space Sift v__VERSION__"
          releaseBody: "Signed Windows installers and updater artifacts for Space Sift v__VERSION__."
          releaseDraft: true
          prerelease: false
          args: "--config src-tauri/tauri.release.conf.json --bundles nsis"
